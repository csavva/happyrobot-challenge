services:
  - type: web
    name: happyrobot-carrier-sales
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: happyrobot-db
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: happyrobot-db
    plan: free
    databaseName: carrier_sales
